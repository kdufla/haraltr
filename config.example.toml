active_device = "AA:BB:CC:DD:EE:FF"

[daemon]
mode = "both"

[bluetooth]
adapter_index = 0
address_type = "br_edr"
poll_interval_ms = 2000
disconnect_poll_interval_ms = 5000

[proximity]
rpl_threshold = 15.0
lock_count = 5
unlock_count = 5
kalman_q = 0.1
kalman_r = 3.0
kalman_initial = 5.0
disconnect_action = "none"

[wake]
duration_secs = 3
mouse_interval_ms = 250
enter_interval_ms = 3000

[web]
enabled = true
port = 7878

[[devices]]
target_mac = "AA:BB:CC:DD:EE:FF"
name = "My Phone"

[[devices]]
target_mac = "11:22:33:44:55:66"
name = "My Watch"

[devices.bluetooth]
address_type = "le_public"

[devices.proximity]
rpl_threshold = 33.0
