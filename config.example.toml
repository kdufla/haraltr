adapter_index = 0

[daemon]
mode = "both"

[br_edr]
poll_interval_ms = 1000
disconnect_poll_interval_ms = 5000
rpl_threshold = 15.0
lock_count = 4
unlock_count = 4
kalman_q = 0.1
kalman_r = 3.0
kalman_initial = 5.0
disconnect_action = "none"

[le]
poll_interval_ms = 1000
disconnect_poll_interval_ms = 5000
rpl_threshold = 60.0
lock_count = 8
unlock_count = 8
kalman_q = 0.1
kalman_r = 8.0
kalman_initial = 40.0
disconnect_action = "none"
fallback_tx_power = 0

[wake]
duration_secs = 3
mouse_interval_ms = 250
enter_interval_ms = 3000

[web]
enabled = true
port = 15999

[[devices]]
uid = 1000
target_mac = "AA:BB:CC:DD:EE:FF"
address_type = "br_edr"
name = "My Phone"

[[devices]]
uid = 1000
target_mac = "11:22:33:44:55:66"
address_type = "le_public"
name = "My Watch"

[devices.bluetooth]
adapter_index = 1

[devices.proximity]
rpl_threshold = 55.0
fallback_tx_power = 4
