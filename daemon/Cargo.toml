[package]
name = "daemon"
version = "0.1.0"
edition = "2024"

[dependencies]
arc-swap = "1"
bdaddr = "0.1.2"
bluer = { version = "0.17", features = ["full"] }
btmgmt = "0.2.5"
btmgmt-packet = "0.2.5"
chrono = "0.4.43"
colored = "3.1.1"
evdev = "0.13.2"
futures = "0.3"
libc = "0.2.180"
argon2 = { version = "0.5", features = ["std"] }
rpassword = "7"
zeroize = "1"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
toml = "0.9.8"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
xdg = "3.0"
zbus = "5.13.2"
