<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haraltr</title>
    <link rel="stylesheet" href="/css/water.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/uPlot.min.css">
</head>

<body>
    <nav>
        <div class="nav-left">
            <a href="#config">Config</a>
            <a href="#monitor">Monitor</a>
        </div>
        <strong class="nav-title">haraltr</strong>
        <div class="nav-right">
            <button id="logout-btn">Logout</button>
        </div>
    </nav>

    <div id="save-status"></div>

    <div id="config-page">
        <h2>Configuration</h2>
        <fieldset>
            <legend>Devices</legend>
            <button type="button" id="refresh-devices-btn">Refresh</button>
            <h4>Connected</h4>
            <ul id="connected-devices"></ul>
            <h4>Available</h4>
            <ul id="available-devices"></ul>
        </fieldset>

        <form id="config-form">
            <fieldset>
                <legend>Configuration</legend>
                <h3>BR/EDR Defaults</h3>
                <label>RPL threshold
                    <input type="number" name="br_edr.rpl_threshold" min="0.5" max="100">
                </label>
                <label>Disconnect action
                    <select name="br_edr.disconnect_action">
                        <option value="lock">Lock</option>
                        <option value="unlock">Unlock</option>
                        <option value="none">None</option>
                    </select>
                </label>
                <label>Lock count
                    <input type="number" name="br_edr.lock_count" min="1" max="100">
                </label>
                <label>Unlock count
                    <input type="number" name="br_edr.unlock_count" min="1" max="100">
                </label>
                <label>Poll interval (ms)
                    <input type="number" name="br_edr.poll_interval_ms" min="100" max="60000">
                </label>
                <label>Disconnected poll interval (ms)
                    <input type="number" name="br_edr.disconnect_poll_interval_ms" min="100" max="60000">
                </label>
                <label>Kalman Q
                    <input type="number" name="br_edr.kalman_q" min="0.01" max="10">
                </label>
                <label>Kalman R
                    <input type="number" name="br_edr.kalman_r" min="0.1" max="100">
                </label>
                <label>Kalman initial
                    <input type="number" name="br_edr.kalman_initial" min="0.1" max="100">
                </label>

                <h3>LE Defaults</h3>
                <label>RPL threshold
                    <input type="number" name="le.rpl_threshold" min="0.5" max="200">
                </label>
                <label>Disconnect action
                    <select name="le.disconnect_action">
                        <option value="lock">Lock</option>
                        <option value="unlock">Unlock</option>
                        <option value="none">None</option>
                    </select>
                </label>
                <label>Lock count
                    <input type="number" name="le.lock_count" min="1" max="100">
                </label>
                <label>Unlock count
                    <input type="number" name="le.unlock_count" min="1" max="100">
                </label>
                <label>Fallback TX
                    <input type="number" name="le.fallback_tx" min="-127" max="126">
                </label>
                <label>Poll interval (ms)
                    <input type="number" name="le.poll_interval_ms" min="100" max="60000">
                </label>
                <label>Disconnected poll interval (ms)
                    <input type="number" name="le.disconnect_poll_interval_ms" min="100" max="60000">
                </label>
                <label>Kalman Q
                    <input type="number" name="le.kalman_q" min="0.01" max="10">
                </label>
                <label>Kalman R
                    <input type="number" name="le.kalman_r" min="0.1" max="100">
                </label>
                <label>Kalman initial
                    <input type="number" name="le.kalman_initial" min="0.1" max="200">
                </label>

                <h3>Bluetooth</h3>
                <label>Adapter index
                    <input type="number" name="adapter_index" min="0" max="65535">
                </label>

                <h3>Wake</h3>
                <label>Duration (s)
                    <input type="number" name="wake.duration_secs" min="1" max="30">
                </label>
                <label>Mouse interval (ms)
                    <input type="number" name="wake.mouse_interval_ms" min="50" max="5000">
                </label>
                <label>Enter interval (ms)
                    <input type="number" name="wake.enter_interval_ms" min="500" max="30000">
                </label>

                <h3>Web</h3>
                <label>Port
                    <input type="number" name="web.port" min="1" max="65535">
                </label>
            </fieldset>
        </form>
    </div>

    <div id="monitor-page" hidden>
        <h2>Monitor</h2>
        <div id="monitor-aggregate">
            <span>Uptime: <span id="mon-uptime">-</span></span>
        </div>
        <div id="device-cards"></div>
    </div>

    <script src="/js/uPlot.iife.min.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
