<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haraltr</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/water.min.css">
    <link rel="stylesheet" href="/css/uPlot.min.css">
</head>

<body>
    <nav>
        <strong>haraltr</strong>
        <a href="#config">Config</a>
        <a href="#monitor">Monitor</a>
        <button id="logout-btn">Logout</button>
    </nav>

    <div id="save-status"></div>

    <div id="config-page">
        <h2>Configuration</h2>
        <fieldset>
            <legend>Devices</legend>
            <button type="button" id="refresh-devices-btn">Refresh</button>
            <h4>Connected</h4>
            <ul id="connected-devices"></ul>
            <h4>Available</h4>
            <ul id="available-devices"></ul>
        </fieldset>

        <label class="toggle">Advanced
            <input type="checkbox" id="advanced-toggle">
            <span class="slider"></span>
        </label>

        <form id="config-form">
            <fieldset>
                <legend>BR/EDR Defaults</legend>
                <label>RPL threshold
                    <input type="number" name="br_edr.rpl_threshold" min="0.5" max="100" step="0.5">
                </label>
                <label>Disconnect action
                    <select name="br_edr.disconnect_action">
                        <option value="lock">Lock</option>
                        <option value="unlock">Unlock</option>
                        <option value="none">None</option>
                    </select>
                </label>
                <label>Lock count
                    <input type="number" name="br_edr.lock_count" min="1" max="100" step="1">
                </label>
                <label>Unlock count
                    <input type="number" name="br_edr.unlock_count" min="1" max="100" step="1">
                </label>
                <label class="advanced" hidden>Poll interval (ms)
                    <input type="number" name="br_edr.poll_interval_ms" min="100" max="60000" step="100">
                </label>
                <label class="advanced" hidden>Disconnect poll interval (ms)
                    <input type="number" name="br_edr.disconnect_poll_interval_ms" min="100" max="60000" step="100">
                </label>
                <label class="advanced" hidden>Kalman Q (process noise)
                    <input type="number" name="br_edr.kalman_q" min="0.01" max="10" step="0.01">
                </label>
                <label class="advanced" hidden>Kalman R (measurement noise)
                    <input type="number" name="br_edr.kalman_r" min="0.1" max="100" step="0.1">
                </label>
                <label class="advanced" hidden>Kalman initial estimate
                    <input type="number" name="br_edr.kalman_initial" min="0.1" max="100" step="0.1">
                </label>
            </fieldset>

            <fieldset>
                <legend>LE Defaults</legend>
                <label>RPL threshold
                    <input type="number" name="le.rpl_threshold" min="0.5" max="200" step="0.5">
                </label>
                <label>Disconnect action
                    <select name="le.disconnect_action">
                        <option value="lock">Lock</option>
                        <option value="unlock">Unlock</option>
                        <option value="none">None</option>
                    </select>
                </label>
                <label>Lock count
                    <input type="number" name="le.lock_count" min="1" max="100" step="1">
                </label>
                <label>Unlock count
                    <input type="number" name="le.unlock_count" min="1" max="100" step="1">
                </label>
                <label>Assumed TX power (dBm, fallback when 127)
                    <input type="number" name="le.assumed_tx_power" min="-127" max="126" step="1">
                </label>
                <label class="advanced" hidden>Poll interval (ms)
                    <input type="number" name="le.poll_interval_ms" min="100" max="60000" step="100">
                </label>
                <label class="advanced" hidden>Disconnect poll interval (ms)
                    <input type="number" name="le.disconnect_poll_interval_ms" min="100" max="60000" step="100">
                </label>
                <label class="advanced" hidden>Kalman Q (process noise)
                    <input type="number" name="le.kalman_q" min="0.01" max="10" step="0.01">
                </label>
                <label class="advanced" hidden>Kalman R (measurement noise)
                    <input type="number" name="le.kalman_r" min="0.1" max="100" step="0.1">
                </label>
                <label class="advanced" hidden>Kalman initial estimate
                    <input type="number" name="le.kalman_initial" min="0.1" max="200" step="0.1">
                </label>
            </fieldset>

            <fieldset class="advanced" hidden>
                <legend>Bluetooth</legend>
                <label>Adapter index
                    <input type="number" name="adapter_index" min="0" max="65535" step="1">
                </label>
            </fieldset>

            <fieldset class="advanced" hidden>
                <legend>Wake</legend>
                <label>Duration (seconds)
                    <input type="number" name="wake.duration_secs" min="1" max="30" step="1">
                </label>
                <label>Mouse interval (ms)
                    <input type="number" name="wake.mouse_interval_ms" min="50" max="5000" step="50">
                </label>
                <label>Enter interval (ms)
                    <input type="number" name="wake.enter_interval_ms" min="500" max="30000" step="500">
                </label>
            </fieldset>

            <fieldset class="advanced" hidden>
                <legend>Web</legend>
                <label>Port
                    <input type="number" name="web.port" min="1" max="65535" step="1">
                </label>
            </fieldset>
        </form>
    </div>

    <div id="monitor-page" hidden>
        <h2>Monitor</h2>
        <div id="monitor-aggregate">
            <span>Uptime: <span id="mon-uptime">-</span></span>
        </div>
        <div id="device-cards"></div>
    </div>

    <script src="/js/uPlot.iife.min.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
